name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Back up our custom code so flutter create doesn't overwrite it
      - name: Backup Custom Source Code
        run: |
          mkdir -p ../backup
          cp -r lib ../backup/
          cp pubspec.yaml ../backup/

      # Generate the native Android wrapper files
      - name: Generate Android Platform Wrapper
        run: |
          flutter create --platforms=android --org com.sksamimgood --project-name aura_call .

      # Restore our custom code, replacing the default template files
      - name: Restore Custom Source Code
        run: |
          rm -rf lib
          cp -r ../backup/lib .
          cp ../backup/pubspec.yaml .

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: |
          # Run build using Gradle toolchain
          flutter build apk --release
