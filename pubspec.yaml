name: aura_call
description: "A premium Android calling application inspired by Apple, Nothing, and Material 3, powered by Google Gemini AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_generative_ai: ^0.4.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  local_auth: ^2.2.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
